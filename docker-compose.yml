services:
  edu-nexus-db:
    image: pgvector/pgvector:pg16
    container_name: edu-nexus-db
    environment:
      POSTGRES_DB: edu_nexus
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: edunexus123
    ports:
      - "5434:5432"
    volumes:
      - edu-nexus-db-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d edu_nexus"]
      interval: 10s
      timeout: 5s
      retries: 5

  edu-nexus-redis:
    image: redis:7-alpine
    container_name: edu-nexus-redis
    ports:
      - "6380:6379"
    volumes:
      - edu-nexus-redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    command: ["redis-server", "--appendonly", "yes"]

volumes:
  edu-nexus-db-data:
  edu-nexus-redis-data:
