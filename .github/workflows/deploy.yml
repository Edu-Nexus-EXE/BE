name: Build & Deploy BE

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: edu-nexus-exe/be   # Explicit lowercase (Docker doesn't support uppercase)

jobs:
  # ===================================================================
  # 1. BUILD image trên runner GitHub Actions → push lên GHCR.
  # ===================================================================
  build:
    name: Build & Push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # cần để push lên GHCR
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===================================================================
  # 2. DEPLOY: SSH vào VPS → đồng bộ compose + init SQL → docker compose up.
  # ===================================================================
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H -p ${{ secrets.SSH_PORT || '22' }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Sync compose + db init to server
        run: |
          ssh -p ${{ secrets.SSH_PORT || '22' }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            'mkdir -p /opt/edu-nexus/db/init'
          scp -P ${{ secrets.SSH_PORT || '22' }} \
              docker-compose.prod.yml \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/edu-nexus/docker-compose.yml
          scp -P ${{ secrets.SSH_PORT || '22' }} \
              Caddyfile \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/edu-nexus/Caddyfile
          scp -P ${{ secrets.SSH_PORT || '22' }} -r \
              db/init/. \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/opt/edu-nexus/db/init/

      - name: Pull image & restart stack
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${GITHUB_SHA::7}"
          ssh -p ${{ secrets.SSH_PORT || '22' }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} bash <<EOF
            set -e
            cd /opt/edu-nexus

            if [ ! -f .env ]; then
              echo "ERROR: /opt/edu-nexus/.env không tồn tại. Copy .env.example và điền secret trước khi deploy."
              exit 1
            fi

            # Login GHCR để pull image (private package)
            echo "${{ secrets.GHCR_READ_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_READ_USER }}" --password-stdin

            export API_IMAGE="$IMAGE"
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
          EOF
